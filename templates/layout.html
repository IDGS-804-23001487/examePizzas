<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizzeria</title>
    <link rel="stylesheet" href="{{url_for('static',filename='dist/output.css')}}" />
    <style>
    body { font-family: Arial, Helvetica, sans-serif; }
    </style>
</head>
<body class="bg-red-50 text-gray-900 min-h-screen">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-full max-w-md">
        {% for category, message in messages %}
        <div class="{% if category == 'error' %}border-l-4 border-red-500 bg-white text-red-700{% else %}border-l-4 border-green-500 bg-white text-green-700{% endif %} px-4 py-3 mb-2 text-sm shadow-md">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <header class="bg-red-700 px-8 py-5 shadow-md">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Pizzeria</h1>
                <p class="text-xs text-red-200 tracking-widest uppercase mt-0.5">Sistema de pedidos</p>
            </div>
            <nav class="flex gap-8 text-sm">
                <a href="/orden"
                    class="{% if request.path == '/orden' %}text-white font-semibold border-b-2 border-white pb-0.5{% else %}text-red-200 hover:text-white{% endif %}">
                    Pedidos
                </a>
                <a href="/reportes"
                    class="{% if request.path == '/reportes' %}text-white font-semibold border-b-2 border-white pb-0.5{% else %}text-red-200 hover:text-white{% endif %}">
                    Reportes
                </a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-8 py-10">
        {% block container %}{% endblock %}
    </main>


    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
</body>
</html>
